<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forward Solutions — Shop borderless. We bring it home.</title>
<link rel="icon" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter+Tight:wght@300;400;500;600&family=DM+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>html,body{margin:0;padding:0;background:#fafaf7;font-family:"Inter Tight",system-ui,sans-serif}#root{min-height:100vh}body{color-scheme:light}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="dp-shared.jsx"></script>
<script type="text/babel" src="dp-chrome.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#c8553d",
  "density": 1,
  "theme": "light",
  "fontPair": "editorial",
  "heroVisual": "globe",
  "heroHeadline": "Shop Anywhere,\nShip Everywhere."
}/*EDITMODE-END*/;
function App(){const[t,setT]=useTweaks(TWEAK_DEFAULTS);const s={"--dp-accent":t.accent,"--dp-accent-soft":t.accent+"22","--dp-density":t.density};return(<><div data-dp-theme={t.theme} data-dp-fontpair={t.fontPair} style={s}><HomePage tweaks={t}/></div><TweaksPanel title="Tweaks">
<TweakSection label="Brand"/><TweakColor label="Primary accent" value={t.accent} onChange={v=>setT("accent",v)}/><TweakRadio label="Theme" value={t.theme} onChange={v=>setT("theme",v)} options={["light","dark"]}/><TweakSelect label="Font pairing" value={t.fontPair} onChange={v=>setT("fontPair",v)} options={["editorial","modern","classic"]}/>
<TweakSection label="Layout"/><TweakSlider label="Density" value={t.density} min={0.85} max={1.15} step={0.01} onChange={v=>setT("density",v)}/><TweakRadio label="Hero visual" value={t.heroVisual} onChange={v=>setT("heroVisual",v)} options={["globe","map","orbits"]}/>
<TweakSection label="Copy"/><TweakText label="Hero headline" value={t.heroHeadline} onChange={v=>setT("heroHeadline",v)}/></TweaksPanel></>);}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
