<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" crossorigin src="/app/assets/index-BVGiIabC.js"></script>
    <link rel="stylesheet" crossorigin href="/app/assets/index-C1INLON4.css">
    <style>
      #theme-toggle {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 99999;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1.5px solid rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        cursor: pointer;
        display: grid;
        place-items: center;
        transition: background 0.2s, border-color 0.2s, transform 0.15s;
        color: #ffffff;
        box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      }
      html:not(.dark) #theme-toggle {
        border-color: rgba(0,0,0,0.12);
        background: rgba(255,255,255,0.85);
        color: #1f1f1f;
        box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      }
      #theme-toggle:hover { transform: scale(1.1); }
      #theme-toggle svg { pointer-events: none; }
    </style>
  </head>
  <body class="bg-white dark:bg-gray-900">
    <div id="root"></div>

    <button id="theme-toggle" title="Toggle dark / light mode" aria-label="Toggle theme">
      <svg id="icon-moon" width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg id="icon-sun" width="17" height="17" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
           style="display:none">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1"  x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22"   x2="5.64"  y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1"  y1="12" x2="3"  y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
        <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
      </svg>
    </button>

    <script>
      (function () {
        var html = document.documentElement;
        var btn  = document.getElementById('theme-toggle');
        var moon = document.getElementById('icon-moon');
        var sun  = document.getElementById('icon-sun');

        function applyTheme(dark) {
          if (dark) {
            html.classList.add('dark');
            moon.style.display = 'block';
            sun.style.display  = 'none';
          } else {
            html.classList.remove('dark');
            moon.style.display = 'none';
            sun.style.display  = 'block';
          }
          localStorage.setItem('theme', dark ? 'dark' : 'light');
        }

        // Restore saved preference (default: dark)
        var saved = localStorage.getItem('theme');
        applyTheme(saved !== 'light');

        btn.addEventListener('click', function () {
          applyTheme(!html.classList.contains('dark'));
        });
      })();
    </script>
  </body>
</html>
